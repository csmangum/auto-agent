# Helm values fragment for grafana/promtail — use with the official chart.
#
# The chart builds Promtail config from Values under `config.*` (see chart values.yaml);
# it does NOT accept a flat Promtail root document as --values.
#
# This file adds a dedicated scrape job for claim-agent pods (same behavior as
# monitoring/promtail-config-k8s.yml.example) via config.snippets.extraScrapeConfigs.
#
# Usage:
#   helm upgrade --install promtail grafana/promtail \
#     --namespace monitoring --create-namespace \
#     -f monitoring/promtail-helm-values-k8s.example.yaml
#
# Adjust config.clients[0].url if your Loki service name or namespace differs.

config:
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
      # tenant_id: claimagent   # when Loki auth_enabled is true
  snippets:
    extraScrapeConfigs: |
      - job_name: claim-agent-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - claim-agent
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: claim-agent
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: claim-agent
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - replacement: claim-agent
            target_label: job
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                claim_type: claim_type
                logger: logger
          - labels:
              level:
              claim_type:
              logger:
          - drop:
              drop_counter_reason: debug_drop
              if: 'level == "DEBUG"'
