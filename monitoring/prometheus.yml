global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: claim-agent

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: claim-agent
    static_configs:
      - targets:
          - claim-agent:8000
    metrics_path: /metrics
    scrape_interval: 15s
