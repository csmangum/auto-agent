apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claim-agent.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claim-agent.labels" . | nindent 4 }}
data:
  OPENAI_MODEL_NAME: {{ .Values.config.openaiModelName | quote }}
  {{- if .Values.config.openaiApiBase }}
  OPENAI_API_BASE: {{ .Values.config.openaiApiBase | quote }}
  {{- end }}
  CLAIM_AGENT_LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  CLAIM_AGENT_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  CLAIM_AGENT_ENVIRONMENT: {{ .Values.config.environment | quote }}
  RUN_MIGRATIONS_ON_STARTUP: {{ .Values.config.runMigrationsOnStartup | quote }}
  ENFORCE_HTTPS: {{ .Values.config.enforceHttps | quote }}
  TRUST_FORWARDED_FOR: {{ .Values.config.trustForwardedFor | quote }}
  HSTS_MAX_AGE: {{ .Values.config.hstsMaxAge | quote }}
  WEBHOOK_ENABLED: {{ .Values.config.webhookEnabled | quote }}
  OTEL_TRACING: {{ .Values.config.otelTracing | quote }}
  OTEL_SERVICE_NAME: {{ .Values.config.otelServiceName | quote }}
  {{- if .Values.config.otelExporterOtlpEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelExporterOtlpEndpoint | quote }}
  {{- end }}
  SECRET_PROVIDER: {{ .Values.config.secretProvider | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
