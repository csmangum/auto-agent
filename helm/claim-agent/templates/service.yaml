{{- /* In dual-Deployment blue/green, only <fullname>-active should receive traffic
     (see service-active.yaml). A headless <fullname> Service would match both slots
     because pods share selectorLabels and only differ by deployment-slot. */ -}}
{{- if not (and (eq .Values.deploymentStrategy.type "BlueGreen") .Values.deploymentStrategy.blueGreen.dualDeployment) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "claim-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claim-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "claim-agent.selectorLabels" . | nindent 4 }}
    {{- if eq .Values.deploymentStrategy.type "BlueGreen" }}
    deployment-slot: {{ .Values.deploymentStrategy.blueGreenSlot | quote }}
    {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
