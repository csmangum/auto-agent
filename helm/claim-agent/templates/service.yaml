apiVersion: v1
kind: Service
metadata:
  name: {{ include "claim-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claim-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "claim-agent.selectorLabels" . | nindent 4 }}
    {{- if and (eq .Values.deploymentStrategy.type "BlueGreen") (not .Values.deploymentStrategy.blueGreen.dualDeployment) }}
    deployment-slot: {{ .Values.deploymentStrategy.blueGreenSlot | quote }}
    {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
