{{- if not .Values.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claim-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claim-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- if .Values.secrets.readReplicaDatabaseUrl }}
  READ_REPLICA_DATABASE_URL: {{ .Values.secrets.readReplicaDatabaseUrl | quote }}
  {{- end }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | quote }}
  CORS_ORIGINS: {{ .Values.secrets.corsOrigins | quote }}
{{- end }}
