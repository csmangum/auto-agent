{{- if not .Values.existingSecret }}
{{- $db := .Values.secrets.databaseUrl | default "" }}
{{- if or (eq $db "") (contains "CHANGE_ME" $db) }}
{{- fail "secrets.databaseUrl must be set to a real PostgreSQL URL (placeholder CHANGE_ME is not allowed). Use existingSecret or override secrets.databaseUrl." }}
{{- end }}
{{- if eq .Values.secrets.openaiApiKey "CHANGE_ME" }}
{{- fail "secrets.openaiApiKey must be set to a real API key. Use existingSecret or override secrets.openaiApiKey." }}
{{- end }}
{{- if contains "CHANGE_ME" .Values.secrets.apiKeys }}
{{- fail "secrets.apiKeys must not use CHANGE_ME. Use existingSecret or set real API_KEYS (e.g. key:role)." }}
{{- end }}
{{- if eq .Values.secrets.jwtSecret "CHANGE_ME" }}
{{- fail "secrets.jwtSecret must be set (e.g. openssl rand -hex 32). Placeholder CHANGE_ME is not allowed." }}
{{- end }}
{{- if eq .Values.secrets.webhookSecret "CHANGE_ME" }}
{{- fail "secrets.webhookSecret must be set to a real HMAC secret. Placeholder CHANGE_ME is not allowed." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claim-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claim-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- if .Values.secrets.readReplicaDatabaseUrl }}
  READ_REPLICA_DATABASE_URL: {{ .Values.secrets.readReplicaDatabaseUrl | quote }}
  {{- end }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | quote }}
{{- end }}
