{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "claim-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claim-agent.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if and (eq $.Values.deploymentStrategy.type "BlueGreen") $.Values.deploymentStrategy.blueGreen.dualDeployment }}{{ include "claim-agent.fullname" $ }}-active{{ else }}{{ include "claim-agent.fullname" $ }}{{ end }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
