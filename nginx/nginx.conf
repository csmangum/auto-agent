# nginx reverse-proxy configuration for claim-agent
# Provides TLS termination, HTTP→HTTPS redirect, and HSTS enforcement.
#
# TLS certificates:
#   Mount your certificate chain and private key into the container at:
#     /etc/nginx/certs/fullchain.pem
#     /etc/nginx/certs/privkey.pem
#   Example with Let's Encrypt / certbot:
#     docker run --rm -v ./certs:/etc/letsencrypt certbot/certbot certonly ...
#   Then set CERT_PATH and KEY_PATH volumes in docker-compose.yml accordingly.
#
# Usage:
#   docker compose --profile tls up   # start claim-agent + nginx TLS proxy
#   docker compose up                 # start claim-agent alone (HTTP, dev mode)

events {
    worker_connections 1024;
}

http {
    # Match API upload limits (documents / photos); nginx default 1m rejects larger bodies.
    client_max_body_size 50m;

    # OCSP stapling and upstream name resolution
    resolver 8.8.8.8 1.1.1.1 valid=300s;

    # Upstream: the claim-agent uvicorn backend
    upstream claim_agent {
        server claim-agent:8000;
        keepalive 32;
    }

    # Logging
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Security: hide nginx version
    server_tokens off;

    # Redirect all plain HTTP → HTTPS
    server {
        listen 80;
        server_name _;

        # Allow ACME HTTP-01 challenge (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # TLS-terminated HTTPS proxy
    server {
        listen 443 ssl;
        server_name _;

        # TLS certificate and key (mount via volume in docker-compose.yml)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS settings (Mozilla Modern compatibility)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # OCSP stapling (resolver in http{} is required for stapling to work)
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers (CSP, HSTS, X-Frame-Options, etc.) are set by the FastAPI app
        # (claim_agent.api.server) so standalone uvicorn and proxied deployments stay consistent.

        # Proxy settings
        location / {
            proxy_pass         http://claim_agent;
            proxy_http_version 1.1;

            # Forward real client info to the upstream
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Keep-alive to upstream
            proxy_set_header Connection "";

            # Streaming / SSE support (disable proxy buffering)
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }
    }
}
