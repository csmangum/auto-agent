apiVersion: apps/v1
kind: Deployment
metadata:
  name: claim-agent
  namespace: claim-agent
  labels:
    app.kubernetes.io/name: claim-agent
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: claim-agent
      app.kubernetes.io/component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claim-agent
        app.kubernetes.io/component: backend
      annotations:
        # Bump this value after editing claim-agent-config or claim-agent-secret so
        # pods roll out, or run: kubectl rollout restart deployment/claim-agent -n claim-agent
        redeploy.claim-agent/config-trigger: "1"
    spec:
      serviceAccountName: claim-agent
      automountServiceAccountToken: false

      # Security hardening at the pod level.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # Graceful shutdown — give uvicorn time to finish in-flight requests.
      terminationGracePeriodSeconds: 30

      containers:
        - name: claim-agent
          # Pin an explicit tag (e.g. 0.1.0); do not use :latest in production.
          image: ghcr.io/csmangum/auto-agent:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # Load non-sensitive config from ConfigMap and secrets from Secret.
          envFrom:
            - configMapRef:
                name: claim-agent-config
            - secretRef:
                name: claim-agent-secret

          # Resource limits — tune based on observed usage in your environment.
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # Liveness probe — restart the container if it stops responding.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe — remove the pod from the Service endpoints until it is ready.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Startup probe — give the app extra time to load models / run migrations.
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 18  # up to 90 s total

          # Container-level security hardening.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Ephemeral writable directories needed at runtime.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-data
              mountPath: /app/data

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        # Persistent claim data volume.  In production, back this with a PVC (see below)
        # or — preferably — use PostgreSQL and object storage (S3) so the pod is stateless.
        - name: app-data
          emptyDir:
            sizeLimit: 1Gi
          # To use a PVC instead of emptyDir, replace the block above with:
          # persistentVolumeClaim:
          #   claimName: claim-agent-data

      # Spread replicas across nodes and availability zones.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: claim-agent
              app.kubernetes.io/component: backend
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: claim-agent
              app.kubernetes.io/component: backend
