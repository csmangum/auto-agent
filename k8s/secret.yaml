# claim-agent Secret template
#
# IMPORTANT: Do NOT commit real credentials to source control.
# In production, manage secrets via:
#   - AWS Secrets Manager + ExternalSecrets Operator
#   - HashiCorp Vault + Vault Agent / Vault Secrets Operator
#   - Sealed Secrets (Bitnami)
#   - SOPS (mozilla/sops)
#
# For a quick start, fill in the placeholder values below and apply with:
#   kubectl apply -f k8s/secret.yaml
#
# stringData: values are plain text; the API stores them as base64 internally.
# To use pre-encoded values instead, switch to data: and supply base64, e.g.:
#   echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: claim-agent-secret
  namespace: claim-agent
  labels:
    app.kubernetes.io/name: claim-agent
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # ── Database ──────────────────────────────────────────────────────────────
  # PostgreSQL primary connection string (required for production).
  DATABASE_URL: "postgresql://claim_user:CHANGE_ME@postgres-host:5432/claims"

  # Optional read replica for HA (comment out if not using replication).
  # READ_REPLICA_DATABASE_URL: "postgresql://claim_user:CHANGE_ME@postgres-replica:5432/claims"

  # ── LLM ───────────────────────────────────────────────────────────────────
  OPENAI_API_KEY: "CHANGE_ME"

  # ── Authentication ────────────────────────────────────────────────────────
  # At least one of API_KEYS / CLAIMS_API_KEY / JWT_SECRET must be set.
  # API_KEYS: comma-separated key:role or key:role:user_id (roles: adjuster, supervisor, admin, executive)
  API_KEYS: "CHANGE_ME:admin"

  # JWT signing secret — set to a long random string (e.g. openssl rand -hex 32).
  JWT_SECRET: "CHANGE_ME"

  # ── Webhooks ──────────────────────────────────────────────────────────────
  WEBHOOK_SECRET: "CHANGE_ME"
