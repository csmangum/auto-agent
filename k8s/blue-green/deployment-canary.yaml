apiVersion: apps/v1
kind: Deployment
metadata:
  name: claim-agent-canary
  namespace: claim-agent
  labels:
    app.kubernetes.io/name: claim-agent
    app.kubernetes.io/component: backend
    track: canary
spec:
  # Keep canary replicas low relative to the stable deployment so only a
  # fraction of requests hit the new version.  With 1 canary replica and
  # 9 stable replicas the canary receives ~10 % of traffic.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claim-agent
      app.kubernetes.io/component: backend
      track: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claim-agent
        app.kubernetes.io/component: backend
        track: canary
    spec:
      serviceAccountName: claim-agent
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 30

      containers:
        - name: claim-agent
          # Set to the new image tag being tested.
          image: ghcr.io/csmangum/auto-agent:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: claim-agent-config
            - secretRef:
                name: claim-agent-secret

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 18

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-data
              mountPath: /app/data

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: app-data
          emptyDir:
            sizeLimit: 1Gi
