apiVersion: apps/v1
kind: Deployment
metadata:
  name: claim-agent-green
  namespace: claim-agent
  labels:
    app.kubernetes.io/name: claim-agent
    app.kubernetes.io/component: backend
    deployment-slot: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: claim-agent
      app.kubernetes.io/component: backend
      deployment-slot: green
  # Blue/green slots use Recreate so all old pods terminate before new ones start.
  # Traffic is served only by the slot currently selected in service.yaml.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claim-agent
        app.kubernetes.io/component: backend
        deployment-slot: green
    spec:
      serviceAccountName: claim-agent
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 30

      containers:
        - name: claim-agent
          # Pin an explicit tag (e.g. 0.1.0); do not use :latest in production.
          image: ghcr.io/csmangum/auto-agent:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: claim-agent-config
            - secretRef:
                name: claim-agent-secret

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 18  # up to 90 s total

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-data
              mountPath: /app/data

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: app-data
          emptyDir:
            sizeLimit: 1Gi

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: claim-agent
              deployment-slot: green
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: claim-agent
              deployment-slot: green
