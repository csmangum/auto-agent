apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claim-agent
  namespace: claim-agent
  labels:
    app.kubernetes.io/name: claim-agent
    app.kubernetes.io/component: backend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: claim-agent
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow inbound traffic only from the ingress controller namespace.
    # Adjust the namespaceSelector if your ingress controller is in a different namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000

  egress:
    # DNS — scope to kube-system (CoreDNS). Adjust labels if your cluster differs.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # PostgreSQL — replace 0.0.0.0/0 with your DB subnet (e.g. RDS).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432

    # HTTPS — LLM APIs, webhooks, etc. Tighten cidr in production.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

    # OTLP — replace cidr with your collector subnet if possible.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
