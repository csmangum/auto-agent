apiVersion: v1
kind: ServiceAccount
metadata:
  name: claim-agent
  namespace: claim-agent
  labels:
    app.kubernetes.io/name: claim-agent
    app.kubernetes.io/component: backend
  annotations:
    # Uncomment and set the ARN to enable IRSA (IAM Roles for Service Accounts) on EKS.
    # This grants the pod access to AWS services (S3, Secrets Manager) without static keys.
    # eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/claim-agent-role
automountServiceAccountToken: false
