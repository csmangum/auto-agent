<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claims System</title>
    <!-- Prevent flash of wrong theme: apply .dark class before first paint.
         Logic must match frontend/src/context/ThemeContext.tsx (STORAGE_KEY + dark resolution).
         Kept as a synchronous external script (not deferred) so the class is applied before
         the first paint; avoids 'unsafe-inline' in the Content-Security-Policy. -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
