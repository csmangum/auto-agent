<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claims System</title>
    <!-- Prevent flash of wrong theme: apply .dark class before first paint.
         Logic must match frontend/src/context/ThemeContext.tsx (STORAGE_KEY + dark resolution). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('claims_theme') || 'system';
          if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
