# Reproducible deployment for claim-agent
# Usage (HTTP / dev):    docker compose up
# Usage (HTTPS / prod):  docker compose --profile tls up
#
# claim-agent publishes port 8000 for local dev. When using --profile tls, comment out
# the ``ports:`` block below so the API is only reachable via nginx (443), not directly on :8000.
#
# For HTTPS, mount TLS certificates into the nginx service:
#   Set NGINX_CERT_PATH and NGINX_KEY_PATH in .env or the environment.
#   Example: NGINX_CERT_PATH=/etc/letsencrypt/live/example.com/fullchain.pem
#            NGINX_KEY_PATH=/etc/letsencrypt/live/example.com/privkey.pem
#   API: https://localhost (proxied via nginx) — or http://localhost:8000 without TLS profile
services:
  claim-agent:
    build: .
    expose:
      - "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - CLAIMS_DB_PATH=/app/data/claims.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o-mini}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - OTEL_TRACING=${OTEL_TRACING:-false}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-claim-agent}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED:-true}
      # Enable HTTPS enforcement when running behind the nginx TLS proxy (set TRUST_FORWARDED_FOR=true
      # in .env so X-Forwarded-Proto redirects and HSTS logic trust the proxy).
      - ENFORCE_HTTPS=${ENFORCE_HTTPS:-false}
      - HSTS_MAX_AGE=${HSTS_MAX_AGE:-31536000}
      - HSTS_PRELOAD=${HSTS_PRELOAD:-false}
      - TRUST_FORWARDED_FOR=${TRUST_FORWARDED_FOR:-false}
    volumes:
      - claim-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional TLS-terminating nginx reverse proxy.
  # Start with: docker compose --profile tls up
  # Requires TLS certificates — see nginx/nginx.conf for instructions.
  nginx:
    image: nginx:1.27-alpine
    profiles: ["tls"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_CERT_PATH:-./nginx/certs/fullchain.pem}:/etc/nginx/certs/fullchain.pem:ro
      - ${NGINX_KEY_PATH:-./nginx/certs/privkey.pem}:/etc/nginx/certs/privkey.pem:ro
      - nginx-acme:/var/www/certbot
    depends_on:
      claim-agent:
        condition: service_healthy
    restart: unless-stopped

  # Monitoring stack: Prometheus + Alertmanager + Grafana.
  # Start with: docker compose --profile monitoring up
  # Access Grafana at http://localhost:3000 (admin / admin — change on first login).
  # Access Prometheus at http://localhost:9090.
  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      claim-agent:
        condition: service_healthy
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: ["monitoring"]
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  claim-data:
  nginx-acme:
  prometheus-data:
  alertmanager-data:
  grafana-data:
