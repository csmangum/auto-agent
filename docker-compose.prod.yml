# Production deployment for claim-agent with PostgreSQL and TLS termination.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml --profile monitoring up -d
#
# Required environment variables (set in .env or the host environment):
#   POSTGRES_PASSWORD   — PostgreSQL password (no default; must be set explicitly)
#   OPENAI_API_KEY      — LLM API key
#   NGINX_CERT_PATH     — Path to TLS certificate chain on the host
#   NGINX_KEY_PATH      — Path to TLS private key on the host
#
# Optional environment variables (override defaults as needed):
#   POSTGRES_USER       — PostgreSQL user (default: claimuser)
#   POSTGRES_DB         — PostgreSQL database name (default: claims)
#   OPENAI_API_BASE     — LLM base URL (e.g. https://openrouter.ai/api/v1)
#   OPENAI_MODEL_NAME   — LLM model name (default: gpt-4o-mini)
#   RUN_MIGRATIONS_ON_STARTUP — Apply Alembic migrations at startup (default: true)
#   GRAFANA_ADMIN_PASSWORD    — Grafana admin password (default: admin; MUST be changed before going live)
#
# TLS certificates:
#   Mount your certificate chain and private key at the paths specified by
#   NGINX_CERT_PATH and NGINX_KEY_PATH. Example with Let's Encrypt:
#     certbot certonly --standalone -d example.com
#     NGINX_CERT_PATH=/etc/letsencrypt/live/example.com/fullchain.pem
#     NGINX_KEY_PATH=/etc/letsencrypt/live/example.com/privkey.pem
#
# First-time setup:
#   1. Copy .env.example to .env and fill in required values.
#   2. Run: docker compose -f docker-compose.prod.yml up -d
#      (Migrations run automatically on first start when RUN_MIGRATIONS_ON_STARTUP=true.)

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-claimuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-claims}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claimuser} -d ${POSTGRES_DB:-claims}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  claim-agent:
    build: .
    expose:
      - "8000"
    # The API is reachable only through nginx on port 80/443.
    # Do not publish port 8000 directly to the host in production.
    restart: always
    environment:
      # DATABASE_URL embeds the password in the container environment. The password is visible
      # via `docker inspect`; for stricter isolation, use Docker secrets and mount credentials
      # via a custom entrypoint script.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-claimuser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-claims}
      - RUN_MIGRATIONS_ON_STARTUP=${RUN_MIGRATIONS_ON_STARTUP:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o-mini}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - OTEL_TRACING=${OTEL_TRACING:-false}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-claim-agent}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED:-true}
      # HTTPS enforcement is on; nginx acts as the TLS-terminating reverse proxy.
      - ENFORCE_HTTPS=${ENFORCE_HTTPS:-true}
      - HSTS_MAX_AGE=${HSTS_MAX_AGE:-31536000}
      - HSTS_PRELOAD=${HSTS_PRELOAD:-false}
      - TRUST_FORWARDED_FOR=${TRUST_FORWARDED_FOR:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      # 30s allows time for Alembic migrations to complete on first start before
      # the healthcheck begins counting retries.
      start_period: 30s

  # TLS-terminating nginx reverse proxy (always enabled in production).
  # See nginx/nginx.conf for full configuration.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_CERT_PATH:?Set NGINX_CERT_PATH in .env}:/etc/nginx/certs/fullchain.pem:ro
      - ${NGINX_KEY_PATH:?Set NGINX_KEY_PATH in .env}:/etc/nginx/certs/privkey.pem:ro
      - nginx-acme:/var/www/certbot
    depends_on:
      claim-agent:
        condition: service_healthy
    restart: always

  # Monitoring stack: Prometheus + Alertmanager + Grafana.
  # Start with: docker compose -f docker-compose.prod.yml --profile monitoring up -d
  # Access Grafana at https://<host>/grafana or http://localhost:3000.
  # Access Prometheus at http://localhost:9090 (restrict access via firewall in production).
  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      claim-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: ["monitoring"]
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      # WARNING: Change GRAFANA_ADMIN_PASSWORD before exposing Grafana publicly.
      # The default 'admin' password must be replaced for any internet-facing deployment.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN:-localhost}/grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: always

volumes:
  postgres-data:
  nginx-acme:
  prometheus-data:
  alertmanager-data:
  grafana-data:
